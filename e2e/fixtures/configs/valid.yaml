# Valid test configuration
memory_root: /tmp/test-memory

analysis:
  max_file_size: 10485760
  skip_extensions: []
  skip_files: []
  cache_dir: /tmp/test-memory/.cache

daemon:
  workers: 2
  rate_limit_per_min: 20
  debounce_ms: 200
  full_rebuild_interval_minutes: 60
  http_port: 0
  log_file: /tmp/test-daemon.log
  log_level: info

graph:
  host: localhost
  port: 6379

mcp:
  log_file: /tmp/test-mcp.log
  log_level: info
