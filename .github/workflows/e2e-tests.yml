name: E2E Tests

on:
  pull_request:
    branches: [master, main]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version detection

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('e2e/Dockerfile.test') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build binary
        run: make build

      - name: Run E2E tests
        run: make test-e2e
        env:
          DOCKER_BUILDKIT: 1

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: |
            e2e/logs/
            /tmp/TestDaemon*/*/daemon.log
          if-no-files-found: ignore

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: |
            coverage.out
            coverage.html
          if-no-files-found: ignore

  e2e-quick:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('e2e/Dockerfile.test') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build binary
        run: make build

      - name: Run quick E2E tests
        run: make test-e2e-quick
        env:
          DOCKER_BUILDKIT: 1
