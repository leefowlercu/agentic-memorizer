# FalkorDB Knowledge Graph for Agentic Memorizer
#
# This docker-compose file provides an alternative to the `memorizer graph start`
# command for running FalkorDB. Use this if you prefer docker-compose over direct Docker commands.
#
# Usage:
#   docker-compose up -d      # Start FalkorDB in background
#   docker-compose down       # Stop FalkorDB
#   docker-compose logs -f    # View FalkorDB logs
#
# The daemon will automatically connect to FalkorDB on localhost:6379 when started.

services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: memorizer-falkordb
    ports:
      - "${FALKORDB_PORT:-6379}:6379"  # Redis protocol
      - "${FALKORDB_UI_PORT:-3000}:3000"  # Browser UI
    volumes:
      - ${MEMORIZER_APP_DIR:-~/.memorizer}/falkordb:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - REDIS_ARGS=--appendonly yes
      - FALKORDB_DATA_PATH=/data
